<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: white;
      position: sticky;
      top: 0;
    }

    #cartBtn {
      background: black;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: contain;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 8px;
      width: 100%;
      margin-top: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h2>Shopping Cart</h2>
  <div id="cartBtn">Cart (0)</div>
</header>

<div class="container"></div>

<script src="script.js"></script>
</body>
</html>
