<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Cairo&family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

<!-- Task 01 -->
<h2>Customize Page</h2>

<select id="fonts">
  <option value="Open Sans">Open</option>
  <option value="Cairo">Cairo</option>
  <option value="Roboto">Roboto</option>
</select>

<select id="colors">
  <option value="black">Black</option>
  <option value="red">Red</option>
  <option value="green">Green</option>
  <option value="blue">Blue</option>
  <option value="purple">Purple</option>
  <option value="orange">Orange</option>
</select>

<select id="sizes"></select>

<hr>

<!-- Task 02 -->
<h2>Form</h2>

<form id="form">
  <input type="text" id="input1" placeholder="Name"><br><br>
  <input type="email" id="input2" placeholder="Email"><br><br>
  <input type="number" id="input3" placeholder="Age"><br><br>

  <select id="select">
    <option value="One">One</option>
    <option value="Two">Two</option>
    <option value="Three">Three</option>
    <option value="Four">Four</option>
    <option value="Five">Five</option>
  </select>
</form>

<script src="main.js"></script>

</body>
</html>
